name: Deploy GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build:pages
        env:
          GITHUB_PAGES: 'true'
          NEXT_PUBLIC_BASE_PATH: '/Ferchozo'

      - name: Deploy built files to repository root
        run: |
          rsync -av out/ ./ \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'src' \
            --exclude 'public' \
            --exclude 'out' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'next.config.ts' \
            --exclude 'tsconfig.json' \
            --exclude 'postcss.config.mjs' \
            --exclude 'README.md' \
            --exclude '.gitignore'

      - name: Commit and push deployment
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Deploy site [skip ci]"
          git push
